  <rect width="1200" height="630" fill="#fbf8f2" />
  <rect x="80" y="80" width="1040" height="470" rx="28" fill="#ffffff" stroke="#d5ddd7" stroke-width="2" />
  <rect x="80" y="80" width="1040" height="98" rx="28" fill="#0f172a" />
  <text x="128" y="142" fill="#f8fafc" font-family="Arial, Helvetica, sans-serif" font-size="30" letter-spacing="4">RESUME</text>
