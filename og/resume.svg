  <text x="918" y="370" fill="#f8fafc" font-family="Arial, Helvetica, sans-serif" font-size="46" font-weight="700">16+</text>
  <text x="895" y="418" fill="#f8fafc" font-family="Arial, Helvetica, sans-serif" font-size="24">years shipped</text>
